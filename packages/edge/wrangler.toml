name = "tagshield-edge"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# --- the static banner bundle + per-site config / chain heads ---
[[kv_namespaces]]
binding = "BANNER"
id = "REPLACE_WITH_KV_ID"        # holds key "b.js" (upload from packages/banner/dist/b.js)

[[kv_namespaces]]
binding = "SITES"
id = "REPLACE_WITH_KV_ID"        # holds cfg:<key>, head:<site_id>

# --- consent ingestion queue (decouples the beacon from persistence) ---
[[queues.producers]]
binding = "CONSENT_QUEUE"
queue = "tagshield-consent"

[[queues.consumers]]
queue = "tagshield-consent"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "tagshield-consent-dlq"

# --- R2 for the immutable daily anchors + cold consent-log archive (object-lock) ---
[[r2_buckets]]
binding = "VAULT"
bucket_name = "tagshield-vault"

# --- vault storage: Supabase over PostgREST (fetch-based — no driver, no nodejs_compat) ---
# Set as secrets (never commit these):
#   wrangler secret put SUPABASE_URL                # https://<ref>.supabase.co
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY   # service_role key (server-only, bypasses RLS)

# --- daily vault anchor job (snapshots each site's chain head to R2 + vault_anchors) ---
# Enable R2 Object Lock (compliance mode) on the tagshield-vault bucket so anchors are immutable.
[triggers]
crons = ["17 3 * * *"]            # every day at 03:17 UTC

[observability]
enabled = true
